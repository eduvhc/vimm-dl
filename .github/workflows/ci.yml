name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      # NuGet package cache
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - run: dotnet restore

      # Run unit tests first (fast, no Docker)
      - name: Unit tests
        run: dotnet test --no-restore --filter "FullyQualifiedName!~Container" --verbosity normal

      # Pull the tools image (cached by Docker on the runner between steps)
      - name: Pull tools image
        run: docker pull ghcr.io/eduvhc/vimm-dl-tools:latest

      # Run container integration tests
      - name: Integration tests
        run: dotnet test --no-restore --filter "FullyQualifiedName~Container" --verbosity normal
