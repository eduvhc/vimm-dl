name: Publish Tools Image

on:
  push:
    paths: ['Modules/Module.Core.Testing/Dockerfile.tools']
  workflow_dispatch:

permissions:
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/vimm-dl-tools

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: Modules/Module.Core.Testing
          file: Modules/Module.Core.Testing/Dockerfile.tools
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
