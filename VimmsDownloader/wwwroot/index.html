<!DOCTYPE html>
<html>
<head>
    <title>VIMM // DL</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#1a1d27;--surface:#222637;--surface2:#2a2f42;--surface3:#323750;
            --card:#262b3e;--card-hover:#2e3348;
            --border:#353b52;--border-light:#424966;
            --accent:#5eead4;--accent2:#2dd4bf;
            --green:#4ade80;--green-bg:rgba(74,222,128,0.08);--green-border:rgba(74,222,128,0.2);
            --amber:#fbbf24;--amber-bg:rgba(251,191,36,0.08);
            --red:#fb7185;--red-bg:rgba(251,113,133,0.06);
            --blue:#60a5fa;--blue-bg:rgba(96,165,250,0.1);
            --text:#f1f5f9;--text2:#cbd5e1;--text3:#8b95ad;--text4:#5c6480;
            --sans:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
            --r:10px;--rs:6px;
        }
        body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;display:flex;flex-direction:column;height:100vh;-webkit-font-smoothing:antialiased}

        /* Header */
        .hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
        .logo{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--accent)}
        .logo span{color:var(--text4);font-weight:400}
        .dot{width:8px;height:8px;border-radius:50%}
        .dot.on{background:var(--green);box-shadow:0 0 8px rgba(74,222,128,0.4)}
        .dot.off{background:var(--red)}.dot.warn{background:var(--amber)}

        /* Add bar */
        .add-bar{display:flex;gap:6px;padding:6px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
        .ta{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text2);font-family:var(--mono);font-size:11px;padding:6px 8px;resize:none;height:30px;outline:none;transition:border-color 0.2s,height 0.2s}
        .ta:focus{border-color:var(--accent2);color:var(--text);height:60px}
        .ta::placeholder{color:var(--text4)}
        .btn-add{background:var(--accent2);color:#0f172a;border:none;font-weight:700;padding:6px 16px;border-radius:var(--rs);cursor:pointer;font-size:11px;font-family:var(--sans)}
        .btn-add:hover{background:var(--accent)}

        /* Controls */
        .ctrls{display:flex;gap:4px;padding:6px 20px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
        .cb{font-family:var(--sans);font-size:11px;font-weight:600;border-radius:var(--rs);padding:6px 16px;cursor:pointer;border:1px solid;background:transparent;transition:background 0.15s,color 0.15s}
        .cb:disabled{opacity:0.2;cursor:not-allowed}
        .cb-go{color:var(--green);border-color:var(--green-border);flex:1}
        .cb-go:hover:not(:disabled){background:var(--green-bg)}
        .cb-pause{color:var(--amber);border-color:rgba(251,191,36,0.25)}
        .cb-pause:hover:not(:disabled){background:var(--amber-bg)}
        .cb-stop{color:var(--red);border-color:rgba(251,113,133,0.25)}
        .cb-stop:hover:not(:disabled){background:var(--red-bg)}
        .cb-clr{color:var(--text4);border-color:var(--border)}
        .cb-clr:hover{color:var(--text3);background:var(--surface)}

        /* Alerts */
        .errs{display:none;padding:6px 20px;background:rgba(248,113,113,0.05);border-bottom:1px solid rgba(248,113,113,0.15);font-size:11px;color:var(--red);font-family:var(--mono);max-height:50px;overflow-y:auto;flex-shrink:0}
        .errs.show{display:block}
        .update-bar{display:none;padding:8px 20px;background:rgba(94,234,212,0.06);border-bottom:1px solid rgba(94,234,212,0.15);font-size:12px;color:var(--accent);flex-shrink:0;align-items:center;gap:10px}
        .update-bar.show{display:flex}
        .update-bar a{color:var(--accent);font-weight:600;text-decoration:underline}
        .update-bar .dismiss{background:none;border:none;color:var(--text4);cursor:pointer;font-size:14px;margin-left:auto;font-family:var(--sans)}

        /* Section headers */
        .sec{display:flex;align-items:center;justify-content:space-between;padding:6px 20px;flex-shrink:0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text4)}
        .sec .cnt{font-family:var(--mono);font-size:11px;color:var(--text3);background:var(--surface2);padding:1px 8px;border-radius:12px;margin-left:6px}
        .sec-right{display:flex;align-items:center;gap:8px}
        .sec-btn{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 10px;border-radius:12px;cursor:pointer;border:1px solid;background:transparent;text-transform:uppercase;letter-spacing:0.5px;transition:background 0.15s}
        .sec-btn:hover{background:var(--surface2)}
        .sec-btn:disabled{opacity:0.3;cursor:not-allowed}

        /* Shared item styles */
        .item{display:flex;align-items:stretch;gap:12px;padding:10px 14px;margin-bottom:3px;background:var(--card);border-radius:var(--r);border:1px solid transparent;transition:background 0.15s,border-color 0.15s;position:relative;overflow:hidden}
        .item:hover{background:var(--card-hover);border-color:var(--border)}
        .item.active{border-color:var(--green-border);background:linear-gradient(135deg,rgba(74,222,128,0.04),rgba(74,222,128,0.01))}
        .item.paused-state{border-color:rgba(251,191,36,0.2);background:linear-gradient(135deg,rgba(251,191,36,0.04),rgba(251,191,36,0.01))}
        .item-body{flex:1;min-width:0}
        .item-r1{display:flex;align-items:center;gap:8px;margin-bottom:2px}
        .item-title{font-weight:600;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
        .badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:12px;text-transform:uppercase;letter-spacing:0.3px;flex-shrink:0}
        .badge-dl{background:var(--green-bg);color:var(--green)}
        .badge-pause{background:var(--amber-bg);color:var(--amber)}
        .badge-queue{background:var(--surface2);color:var(--text4)}
        .badge-extract{background:var(--amber-bg);color:var(--amber)}
        .badge-convert{background:var(--blue-bg);color:var(--blue)}
        .badge-done{background:var(--green-bg);color:var(--green)}
        .badge-error{background:var(--red-bg);color:var(--red)}
        .badge-skip{background:var(--surface2);color:var(--text4)}
        .item-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:2px}
        .item-plat{display:inline-flex;align-items:center;gap:6px;color:var(--text2);font-weight:500}
        .item-icon{width:28px;height:28px;display:inline-block;flex-shrink:0;-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center}
        .item-icon.ic-ps{background:#3b82f6}.item-icon.ic-nintendo{background:#ef4444}.item-icon.ic-sega{background:#3b82f6}.item-icon.ic-xbox{background:#22c55e}.item-icon.ic-default{background:var(--text3)}
        .item-size{color:var(--accent2);font-family:var(--mono);font-weight:600;font-size:11px;font-variant-numeric:tabular-nums}
        .pct{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green);flex-shrink:0;font-variant-numeric:tabular-nums}

        /* Progress */
        .prog{margin-top:6px}
        .prog-info{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px}
        .prog-size{color:var(--text3);font-family:var(--mono);font-variant-numeric:tabular-nums}
        .prog-track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
        .prog-fill{height:100%;border-radius:2px;transition:width 0.4s ease}
        .prog-fill.dl{background:linear-gradient(90deg,var(--accent2),var(--green))}
        .prog-fill.paused-bar{background:linear-gradient(90deg,#d97706,var(--amber))}
        .prog-fill.extract{background:var(--amber)}
        .prog-fill.convert{background:var(--blue)}

        /* Partial */
        .partial{margin-top:4px}
        .partial-txt{font-size:10px;color:var(--amber);font-family:var(--mono);font-weight:500;font-variant-numeric:tabular-nums}
        .partial-track{height:3px;background:var(--surface2);border-radius:2px;margin-top:2px;overflow:hidden}
        .partial-fill{height:100%;background:var(--amber);border-radius:2px}

        /* Buttons */
        .item-acts{display:flex;flex-direction:column;gap:3px;flex-shrink:0;align-items:center}
        .ibtn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;transition:background 0.15s,transform 0.15s;border:none}
        .ibtn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
        .ibtn-play{background:var(--green-bg);color:var(--green);font-size:13px}
        .ibtn-play:hover{background:rgba(74,222,128,0.2);transform:scale(1.1)}
        .ibtn-pause{background:var(--amber-bg);color:var(--amber);font-size:13px;position:relative}
        .ibtn-pause::before,.ibtn-pause::after{content:'';position:absolute;top:9px;width:3px;height:12px;background:var(--amber);border-radius:1px}
        .ibtn-pause::before{left:10px}.ibtn-pause::after{right:10px}
        .ibtn-pause:hover{background:rgba(251,191,36,0.2);transform:scale(1.1)}
        .ibtn-resume{background:var(--green-bg);color:var(--green);font-size:13px;box-shadow:0 0 12px rgba(74,222,128,0.2)}
        .ibtn-resume:hover{background:rgba(74,222,128,0.25);transform:scale(1.1)}
        .ibtn-x{background:transparent;color:var(--text4);font-size:11px}
        .ibtn-x:hover{background:var(--red-bg);color:var(--red);transform:scale(1.1)}
        .ibtn-mv{background:transparent;color:var(--text4);font-size:10px;width:22px;height:22px}
        .ibtn-mv:hover{background:var(--surface3);color:var(--text2);transform:scale(1.1)}
        .ibtn-mv:disabled{opacity:0.15;cursor:not-allowed;transform:none}
        .ibtn-sm{width:24px;height:24px;font-size:12px}
        .ibtn-retry{background:var(--amber-bg);color:var(--amber)}
        .ibtn-retry:hover{background:rgba(251,191,36,0.2);transform:scale(1.1)}
        .ibtn-conv{background:var(--blue-bg);color:var(--blue)}
        .ibtn-conv:hover{background:rgba(96,165,250,0.2);transform:scale(1.1)}
        .ibtn-dismiss{background:transparent;color:var(--text4)}
        .ibtn-dismiss:hover{background:var(--surface2);color:var(--text3);transform:scale(1.1)}

        /* Format selector */
        .fmt{display:inline-flex;align-items:center;gap:4px;margin-left:8px}
        .fmt select{background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:var(--rs);font-family:var(--mono);font-size:10px;padding:1px 4px;cursor:pointer;outline:none;touch-action:manipulation}
        .fmt select:hover,.fmt select:focus-visible{border-color:var(--accent2)}

        /* History specific */
        .h-files{margin-top:4px;display:flex;flex-direction:column;gap:2px}
        .h-file{display:flex;align-items:center;gap:6px;font-size:10px;font-family:var(--mono)}
        .h-file-label{color:var(--text4);min-width:48px;text-transform:uppercase;font-weight:600;font-size:9px}
        .h-file-name{color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
        .h-file-name.exists{color:var(--accent2)}
        .h-file-name.missing{color:var(--red);font-style:italic}
        .h-file-size{color:var(--text4);font-variant-numeric:tabular-nums;flex-shrink:0}
        .h-file-check{flex-shrink:0;font-size:11px}
        .h-file-check.ok{color:var(--green)}
        .h-file-check.fail{color:var(--red)}
        .h-time{font-size:10px;color:var(--text4);font-family:var(--mono);margin-top:2px;font-variant-numeric:tabular-nums}

        /* Lists */
        .list{flex:1;overflow-y:auto;padding:0 12px 8px;min-height:0}
        .list-fixed{overflow-y:auto;padding:0 12px 8px;max-height:40vh;flex-shrink:0}
        .empty{color:var(--text4);padding:40px;text-align:center;font-size:13px}

        /* Sync */
        .sync-bar{display:flex;gap:6px;padding:6px 20px;align-items:center;flex-shrink:0}
        .sync-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text2);font-family:var(--mono);font-size:11px;padding:6px 8px;outline:none;transition:border-color 0.2s}
        .sync-input:focus{border-color:var(--accent2);color:var(--text)}
        .sync-input::placeholder{color:var(--text4)}
        .sync-disks{display:flex;gap:10px;padding:4px 20px 6px;flex-shrink:0}
        .sync-disk{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;font-size:11px}
        .sync-disk-label{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:6px}
        .sync-disk-label .drive{color:var(--text);font-family:var(--mono);text-transform:none;letter-spacing:0}
        .sync-disk-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
        .sync-disk-key{color:var(--text4)}
        .sync-disk-val{color:var(--text2);font-family:var(--mono);font-variant-numeric:tabular-nums}
        .sync-disk-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:6px}
        .sync-disk-fill{height:100%;border-radius:2px}
        .sync-stats{display:flex;gap:12px;padding:0 20px 4px;font-size:11px;font-family:var(--mono)}
        .sync-stat{display:flex;align-items:center;gap:4px}
        .sync-stat .dot-sm{width:6px;height:6px;border-radius:50%;flex-shrink:0}
        .sync-file{display:flex;align-items:center;gap:8px;padding:6px 10px;margin-bottom:2px;background:var(--card);border-radius:var(--rs);font-size:11px;font-family:var(--mono)}
        .sync-file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)}
        .sync-file-size{color:var(--text4);font-variant-numeric:tabular-nums;flex-shrink:0}
        .sync-file-status{flex-shrink:0;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px}
        .sync-copy-prog{height:3px;background:var(--surface2);border-radius:2px;margin-top:3px;overflow:hidden}
        .sync-copy-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--green));border-radius:2px;transition:width 0.3s}

        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
        @media(prefers-reduced-motion:reduce){.prog-fill,.partial-fill,.sync-copy-fill{transition:none}}
    </style>
</head>
<body>

<div class="hdr">
    <div class="logo">VIMM<span>//</span>DL</div>
    <div class="dot on" id="conn-dot"></div>
</div>

<div class="add-bar">
    <textarea class="ta" id="urls" placeholder="Paste vault URLs, one per line..." spellcheck="false"></textarea>
    <button class="btn-add" id="btn-add">Add</button>
</div>

<div class="ctrls">
    <button class="cb cb-go" id="btn-start" disabled>Start</button>
    <button class="cb cb-pause" id="btn-pause" disabled>Pause</button>
    <button class="cb cb-stop" id="btn-stop" disabled>Stop</button>
    <button class="cb cb-clr" id="btn-clear">Clear</button>
</div>

<div class="update-bar" id="update-bar"></div>
<div class="errs" id="err-box"></div>

<div class="sec">Active <span class="cnt" id="active-count">0</span></div>
<div class="list" id="active-list"><div class="empty">No items in queue</div></div>

<div class="sec">
    History <span class="cnt" id="history-count">0</span>
    <div class="sec-right">
        <button class="sec-btn" style="color:var(--accent);border-color:rgba(94,234,212,0.25)" id="btn-conv-all">Convert All</button>
    </div>
</div>
<div class="list-fixed" id="history-list"><div class="empty">No downloads yet</div></div>

<div class="sec">
    Sync <span class="cnt" id="sync-count">0</span>
    <div class="sec-right">
        <button class="sec-btn" style="color:var(--green);border-color:var(--green-border)" id="btn-sync-all" disabled>Copy All New</button>
    </div>
</div>
<div class="sync-bar">
    <input class="sync-input" id="sync-path" placeholder="Target path (e.g. H:\PS3ISO)" spellcheck="false">
    <button class="cb cb-go" id="btn-sync-compare" style="padding:6px 12px;flex:none">Compare</button>
</div>
<div class="sync-disks" id="sync-disks" style="display:none"></div>
<div class="sync-stats" id="sync-stats" style="display:none"></div>
<div class="list-fixed" id="sync-list"><div class="empty">Set target path and click Compare</div></div>

<script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.0/dist/browser/signalr.min.js"></script>
<script>
const $=id=>document.getElementById(id);
const hub=new signalR.HubConnectionBuilder().withUrl('/hub').withAutomaticReconnect().build();
let running=false,paused=false,activePath='';
let partialsCache={},activeUrl=null,activeDlInfo=null;
const metaCache={};

const platformIcons={
    'playstation 3':'playstation3.svg','playstation 2':'playstation2.svg','playstation':'playstation.svg',
    'ps3':'playstation3.svg','ps2':'playstation2.svg','ps1':'playstation.svg','psp':'psp.svg','ps vita':'psvita.svg',
    'nintendo 64':'n64.svg','gamecube':'gamecube.svg','wii':'wii.svg','wii u':'wiiu.svg','switch':'switch.svg',
    'game boy':'gameboy.svg','game boy color':'gameboycolor.svg','game boy advance':'gba.svg',
    'nintendo ds':'nds.svg','nintendo 3ds':'3ds.svg','nes':'nes.svg',
    'super nintendo':'snes.svg','snes':'snes.svg','sega genesis':'genesis.svg','genesis':'genesis.svg',
    'sega saturn':'saturn.svg','dreamcast':'dreamcast.svg','xbox':'xbox.svg','xbox 360':'xbox360.svg',
};
function iconFor(p){
    if(!p)return'';
    const f=platformIcons[p.toLowerCase()];if(!f)return'';
    const k=p.toLowerCase();
    const cls=k.includes('playstation')||k.includes('ps')||k==='psp'?'ic-ps'
        :k.includes('nintendo')||k.includes('game boy')||k==='nes'||k.includes('snes')||k==='super nintendo'||k.includes('wii')||k==='gamecube'||k==='switch'||k.includes('ds')?'ic-nintendo'
        :k.includes('sega')||k==='genesis'||k==='dreamcast'||k==='saturn'?'ic-sega'
        :k.includes('xbox')?'ic-xbox':'ic-default';
    return `<span class="item-icon ${cls}" style="-webkit-mask-image:url(/icons/${f});mask-image:url(/icons/${f})"></span>`;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmtBytes(b){if(!b)return'';if(b>=1073741824)return(b/1073741824).toFixed(2)+' GB';if(b>=1048576)return(b/1048576).toFixed(2)+' MB';return(b/1024).toFixed(2)+' KB'}
function showError(msg){const el=$('err-box');el.classList.add('show');el.innerHTML+=`<div>${new Date().toLocaleTimeString('en-US',{hour12:false})} ${esc(msg)}</div>`;el.scrollTop=el.scrollHeight}

function setRunning(v){running=v;updateBtns();renderActive()}
function setPaused(v){paused=v;updateBtns();renderActive()}
function updateBtns(){
    const has=$('active-count').textContent!=='0';
    $('btn-start').disabled=running&&!paused;$('btn-start').textContent=paused?'Resume':'Start';
    if(!has&&!paused)$('btn-start').disabled=true;
    $('btn-pause').disabled=!running;$('btn-stop').disabled=!running&&!paused;
}

async function fetchMeta(url){if(metaCache[url])return metaCache[url];try{const r=await fetch('/api/meta?url='+encodeURIComponent(url));if(r.ok){const m=await r.json();if(m.formats&&typeof m.formats==='string')try{m.formats=JSON.parse(m.formats)}catch{m.formats=null};metaCache[url]=m;return m}}catch{}return null}

async function loadConfig(silent){
    const c=await(await fetch('/api/config')).json();
    activePath=c.activePath;
    if(c.isRunning)setRunning(true);
}
async function restoreStatus(){
    const s=await(await fetch('/api/status')).json();
    if(s.currentUrl) activeUrl=s.currentUrl;
    if(s.isRunning){running=true;if(s.progress)parseProgress(s.progress);updateBtns();renderActive()}
    if(s.isPaused){paused=true;updateBtns();renderActive()}
    if(s.recentLogs?.length)s.recentLogs.forEach(l=>{if(l.type==='Error')showError(l.message)});
}

// --- Data ---
let queuedItems=[],historyItems=[],convStatuses={},metaFetching=new Set();

let _loadPending=false,_loadInFlight=false;
function loadData(){
    if(_loadInFlight){_loadPending=true;return}
    _loadInFlight=true;_loadPending=false;
    _loadDataImpl().finally(()=>{_loadInFlight=false;if(_loadPending)loadData()});
}
async function _loadDataImpl(){
    const [d,p]=await Promise.all([
        fetch('/api/data').then(r=>r.json()),
        fetch('/api/partials').then(r=>r.json()).catch(()=>({files:[]}))
    ]);
    partialsCache={};(p.files||[]).forEach(f=>{partialsCache[f.name]=f});
    queuedItems=d.queued.map(it=>{if(it.formats&&typeof it.formats==='string')try{it.formats=JSON.parse(it.formats)}catch{it.formats=null};return it});
    historyItems=d.history||[];
    // Update conv statuses from history
    historyItems.forEach(h=>{if(h.convPhase)convStatuses[h.filename]={zipName:h.filename,phase:h.convPhase,message:h.convMessage||''}});
    renderActive();renderHistory();
    // Fetch missing metadata sequentially
    const miss=d.queued.filter(it=>!it.title&&!metaFetching.has(it.url));
    if(miss.length){
        (async()=>{
            for(const it of miss){
                if(metaFetching.has(it.url))continue;
                metaFetching.add(it.url);
                const m=await fetchMeta(it.url);
                metaFetching.delete(it.url);
                if(m){const qi=queuedItems.find(q=>q.url===it.url);if(qi){qi.title=m.title;qi.platform=m.platform;qi.size=m.size;qi.formats=m.formats}renderActive()}
            }
        })();
    }
}

// --- Active Section ---
// Merges: queue items + items being extracted/converted (from convStatuses)

function renderActive(){
    const el=$('active-list');

    // Items actively converting (not in queue)
    const convertingItems=Object.values(convStatuses)
        .filter(c=>c.phase==='queued'||c.phase==='extracting'||c.phase==='extracted'||c.phase==='converting')
        .map(c=>({type:'conv',data:c}));

    // Queue items
    const queueItems=queuedItems.map(it=>({type:'queue',data:it}));

    // Merge: downloading item first, then converting, then queued
    const allActive=[...queueItems,...convertingItems.filter(c=>!queuedItems.some(q=>q.url===c.data.zipName))];
    $('active-count').textContent=allActive.length;

    if(!allActive.length){el.innerHTML='<div class="empty">No items in queue</div>';updateBtns();return}

    el.innerHTML=allActive.map((entry,i)=>{
        if(entry.type==='conv') return renderConvItem(entry.data);
        return renderQueueItem(entry.data,i,queuedItems.length);
    }).join('');
    updateBtns();
}

function renderQueueItem(it,i,total){
    const has=!!it.title;
    const isActive=activeUrl&&it.url===activeUrl&&running&&!paused;
    const isPaused=activeUrl&&it.url===activeUrl&&paused;
    const title=has?esc(it.title):esc(it.url.split('/').pop());
    const icon=has?iconFor(it.platform):'';
    const plat=has&&it.platform?`<span class="item-plat">${icon}${esc(it.platform)}</span>`:'';
    const fmts=Array.isArray(it.formats)&&it.formats.length>1;
    const curFmt=it.format||0;
    const fmtSize=fmts?it.formats.find(f=>f.value===curFmt)?.size||it.size:it.size;
    const size=has&&fmtSize?`<span class="item-size">${esc(fmtSize)}</span>`:'';
    const fmtSelect=fmts?`<span class="fmt"><select onchange="setItemFormat(${it.id},+this.value)">${it.formats.map(f=>`<option value="${f.value}"${f.value===curFmt?' selected':''}>${esc(f.label)}</option>`).join('')}</select></span>`:'';
    const meta=(plat||size||fmtSelect)?`<div class="item-meta">${plat}${fmtSelect}${size}</div>`:(has?'':`<div class="item-meta" style="color:var(--text4)">${esc(it.url)}</div>`);

    let badge='',pctText='',progHtml='';
    if(isActive&&activeDlInfo){
        badge='<span class="badge badge-dl">Downloading</span>';
        pctText=`<span class="pct">${activeDlInfo.pct}</span>`;
        progHtml=`<div class="prog"><div class="prog-info"><span class="prog-size">${activeDlInfo.size}</span></div><div class="prog-track"><div class="prog-fill dl" style="width:${activeDlInfo.width}"></div></div></div>`;
    } else if(isPaused&&activeDlInfo){
        badge='<span class="badge badge-pause">Paused</span>';
        pctText=`<span class="pct" style="color:var(--amber)">${activeDlInfo.pct}</span>`;
        progHtml=`<div class="prog"><div class="prog-info"><span class="prog-size">${activeDlInfo.size}</span></div><div class="prog-track"><div class="prog-fill paused-bar" style="width:${activeDlInfo.width}"></div></div></div>`;
    } else if(isActive) badge='<span class="badge badge-dl">Starting</span>';
    else if(isPaused) badge='<span class="badge badge-pause">Paused</span>';
    else {
        badge='<span class="badge badge-queue">Queued</span>';
        // Partial file check
        if(has&&it.size){
            const sz=it.size.match(/([\d.]+)\s*(GB|MB)/i);
            if(sz){const totalMB=sz[2].toUpperCase()==='GB'?parseFloat(sz[1])*1024:parseFloat(sz[1]);
                const slug=it.url.split('/').pop();
                const hit=slug?Object.keys(partialsCache).find(n=>{
                    const nl=n.toLowerCase(),tl=it.title.toLowerCase();
                    return nl.includes(slug.toLowerCase())||nl.includes(tl)||tl.includes(nl.replace(/\.[^.]+$/,''))
                }):null;
                if(hit){const pf=partialsCache[hit],pct=totalMB>0?(pf.mb/totalMB*100):0;if(pct>0.1&&pct<100)progHtml=`<div class="partial"><span class="partial-txt">${pf.mb.toFixed(2)} / ${totalMB.toFixed(2)} MB \u00b7 ${pct.toFixed(2)}%</span><div class="partial-track"><div class="partial-fill" style="width:${Math.min(pct,100).toFixed(2)}%"></div></div></div>`}}
        }
    }

    const cls=isActive?'item active':isPaused?'item paused-state':'item';
    let actionBtn;
    if(isActive) actionBtn=`<button class="ibtn ibtn-pause" onclick="pauseItem()" title="Pause"></button>`;
    else if(isPaused) actionBtn=`<button class="ibtn ibtn-resume" onclick="resumeItem()" title="Resume">&#9654;</button>`;
    else actionBtn=`<button class="ibtn ibtn-play" onclick="playItem(${it.id})" title="Download this">&#9654;</button>`;

    return `<div class="${cls}">
        <div class="item-acts">
            <button class="ibtn ibtn-mv" onclick="moveItem(${it.id},'up')" title="Move up" ${i===0?'disabled':''}>&#9650;</button>
            <button class="ibtn ibtn-mv" onclick="moveItem(${it.id},'down')" title="Move down" ${i===total-1?'disabled':''}>&#9660;</button>
        </div>
        <div class="item-body">
            <div class="item-r1">${pctText}<span class="item-title">${title}</span>${badge}</div>
            ${meta}${progHtml}
        </div>
        <div class="item-acts">
            ${actionBtn}
            <button class="ibtn ibtn-x" onclick="rmItem(${it.id})" title="Remove">&#10005;</button>
        </div>
    </div>`;
}

function renderConvItem(conv){
    const isExtracting=conv.phase==='extracting';
    const isConverting=conv.phase==='converting';
    const pctMatch=conv.message.match(/(\d+)%/);
    const pct=pctMatch?parseInt(pctMatch[1]):null;
    const badgeText=pct!==null&&isExtracting?`Extract ${pct}%`:isExtracting?'Extracting':isConverting?'Converting':conv.phase==='extracted'?'Waiting':'Processing';
    const badgeCls=isExtracting||conv.phase==='extracted'?'badge-extract':'badge-convert';

    let progHtml='';
    if(pct!==null){
        const cls=isExtracting?'extract':'convert';
        progHtml=`<div class="prog"><div class="prog-track"><div class="prog-fill ${cls}" style="width:${pct}%"></div></div></div>`;
    }

    const fnAttr=`data-fn="${esc(conv.zipName)}"`;
    return `<div class="item" style="border-color:rgba(251,191,36,0.2)">
        <div class="item-body">
            <div class="item-r1"><span class="item-title">${esc(conv.zipName)}</span><span class="badge ${badgeCls}">${badgeText}</span></div>
            ${progHtml}
        </div>
        <div class="item-acts">
            <button class="ibtn ibtn-sm" style="background:var(--red-bg);color:var(--red)" ${fnAttr} onclick="abortConvert(this.dataset.fn)" title="Abort">&#9632;</button>
        </div>
    </div>`;
}

// --- History Section ---

function renderHistory(){
    const el=$('history-list');
    $('history-count').textContent=historyItems.length;
    if(!historyItems.length){el.innerHTML='<div class="empty">No downloads yet</div>';return}

    el.innerHTML=historyItems.map(it=>{
        const title=it.title?esc(it.title):esc(it.filename);
        const icon=it.platform?iconFor(it.platform):'';
        const plat=it.platform?`<span class="item-plat">${icon}${esc(it.platform)}</span>`:'';
        const isPs3=it.platform&&it.platform.toLowerCase()==='playstation 3';

        // Archive row
        const archiveCheck=it.fileExists?'<span class="h-file-check ok">&#10003;</span>':'<span class="h-file-check fail">&#10007;</span>';
        const archiveName=it.fileExists?'exists':'missing';
        const archiveRow=`<div class="h-file">${archiveCheck}<span class="h-file-label">Archive</span><span class="h-file-name ${archiveName}" title="${esc(it.filepath||it.filename)}">${esc(it.filename)}</span><span class="h-file-size">${fmtBytes(it.fileSize)}</span></div>`;

        // ISO row (PS3 only)
        let isoRow='';
        if(isPs3){
            const conv=convStatuses[it.filename];
            const phase=conv?.phase||it.convPhase;

            if(it.isoExists&&it.isoFilename){
                isoRow=`<div class="h-file"><span class="h-file-check ok">&#10003;</span><span class="h-file-label">ISO</span><span class="h-file-name exists" title="${esc(it.isoFilename)}">${esc(it.isoFilename)}</span><span class="h-file-size">${fmtBytes(it.isoSize)}</span></div>`;
            } else if(phase==='done'){
                isoRow=`<div class="h-file"><span class="h-file-check ok">&#10003;</span><span class="h-file-label">ISO</span><span class="h-file-name exists">${esc(conv?.message||it.convMessage||'Converted')}</span></div>`;
            } else if(phase==='extracting'||phase==='converting'||phase==='queued'||phase==='extracted'){
                const label=phase==='extracting'?'Extracting\u2026':phase==='converting'?'Converting\u2026':'Queued\u2026';
                isoRow=`<div class="h-file"><span class="h-file-check" style="color:var(--amber)">\u25CB</span><span class="h-file-label">ISO</span><span class="h-file-name" style="color:var(--amber)">${label}</span></div>`;
            } else if(phase==='error'){
                const fnAttr=`data-fn="${esc(it.filename)}"`;
                isoRow=`<div class="h-file"><span class="h-file-check fail">&#10007;</span><span class="h-file-label">ISO</span><span class="h-file-name" style="color:var(--red)">${esc(conv?.message||it.convMessage||'Failed')}</span><button class="ibtn ibtn-sm ibtn-retry" ${fnAttr} onclick="retryConvert(this.dataset.fn)" title="Retry">&#8635;</button></div>`;
            } else if(phase==='skipped'){
                isoRow=`<div class="h-file"><span class="h-file-check" style="color:var(--text4)">\u2014</span><span class="h-file-label">ISO</span><span class="h-file-name" style="color:var(--text4)">Skipped (not PS3 JB folder)</span></div>`;
            } else {
                // No conversion attempted
                const fnAttr=`data-fn="${esc(it.filename)}"`;
                isoRow=`<div class="h-file"><span class="h-file-check" style="color:var(--text4)">\u2014</span><span class="h-file-label">ISO</span><span class="h-file-name" style="color:var(--text4)">Not converted</span><button class="ibtn ibtn-sm ibtn-conv" ${fnAttr} onclick="convertSingle(this.dataset.fn)" title="Convert to ISO">&#9881;</button><button class="ibtn ibtn-sm ibtn-dismiss" ${fnAttr} onclick="markDone(this.dataset.fn)" title="Mark as already converted">&#10003;</button></div>`;
            }
        }

        // Timestamp
        const time=it.completedAt?`<div class="h-time">${esc(it.completedAt)}</div>`:'';

        // Overall status badge
        let statusBadge='';
        if(isPs3){
            const conv=convStatuses[it.filename];
            const phase=conv?.phase||it.convPhase;
            if(it.isoExists||phase==='done') statusBadge='<span class="badge badge-done">ISO Ready</span>';
            else if(phase==='error') statusBadge='<span class="badge badge-error">ISO Failed</span>';
            else if(phase==='extracting'||phase==='converting'||phase==='queued'||phase==='extracted') statusBadge='<span class="badge badge-extract">Converting</span>';
            else statusBadge='<span class="badge badge-queue">No ISO</span>';
        }

        // Delete button for missing files
        let acts='';
        if(!it.fileExists&&it.id>0) acts=`<button class="ibtn ibtn-sm ibtn-x" onclick="removeCompleted(${it.id})" title="Remove entry">&#10005;</button>`;

        return `<div class="item">
            <div class="item-body">
                <div class="item-r1"><span class="item-title">${title}</span>${plat}${statusBadge}</div>
                <div class="h-files">${archiveRow}${isoRow}</div>
                ${time}
            </div>
            <div class="item-acts" style="justify-content:center">${acts}</div>
        </div>`;
    }).join('');
}

// --- Actions ---

window.retryConvert=async name=>{
    delete convStatuses[name];
    renderHistory();
    convertSingle(name);
};

window.convertSingle=async filename=>{
    try{
        const r=await fetch('/api/convert-ps3/single',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename})});
        if(!r.ok){const t=await r.text();showError(t||'Failed to queue conversion');return}
        const d=await r.json();
        if(d.enqueued){convStatuses[filename]={zipName:filename,phase:'queued',message:'Waiting...'};renderActive();renderHistory()}
    }catch(e){showError('Convert failed: '+e.message)}
};

window.markDone=async filename=>{
    try{
        const r=await fetch('/api/convert-ps3/mark-done',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename})});
        if(r.ok){convStatuses[filename]={zipName:filename,phase:'done',message:'Marked as converted'};renderActive();renderHistory();loadData()}
        else showError('Failed to mark as converted');
    }catch(e){showError('Failed: '+e.message)}
};

window.abortConvert=async filename=>{
    try{
        await fetch('/api/convert-ps3/abort',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename})});
        loadData();
    }catch(e){showError('Abort failed: '+e.message)}
};

window.removeCompleted=async id=>{
    await fetch(`/api/completed/${id}`,{method:'DELETE'});
    loadData();
};

$('btn-conv-all').onclick=async()=>{
    $('btn-conv-all').disabled=true;
    $('btn-conv-all').textContent='Queuing\u2026';
    try{
        const r=await fetch('/api/convert-ps3',{method:'POST'});
        const d=await r.json();
        if(d.queued===0&&d.skipped===0) showError('No PS3 zips found in completed downloads');
        else if(d.queued>0) $('btn-conv-all').textContent=`Queued ${d.queued}`;
    }catch(e){showError('Failed to start conversions: '+e.message)}
    setTimeout(()=>{$('btn-conv-all').disabled=false;$('btn-conv-all').textContent='Convert All'},2000);
    loadData();
};

window.setItemFormat=async(id,fmt)=>{await fetch('/api/queue/format',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,format:fmt})});const qi=queuedItems.find(q=>q.id===id);if(qi)qi.format=fmt;renderActive()};

function parseProgress(msg){
    const m=msg.match(/^(.+?):\s*([\d.]+)\s*\/\s*([\d.]+)\s*MB\s*\(([\d.]+)%\)/);
    if(m){
        const[,file,dl,total,pct]=m;
        activeDlInfo={pct:parseFloat(pct).toFixed(2)+'%',size:`${dl} / ${total} MB`,width:pct+'%'};
        document.title=`${parseFloat(pct).toFixed(2)}% \u2014 ${file}`;
        renderActive();
        return;
    }
    const m2=msg.match(/^(.+?):\s*([\d.]+)\s*MB/);
    if(m2){activeDlInfo={pct:'--',size:m2[2]+' MB',width:'0%'};renderActive()}
}

// --- SignalR Events ---
hub.on('Status',msg=>{
    if(msg.startsWith('Processing:'))activeUrl=msg.replace('Processing: ','').trim();
    renderActive();
});
hub.on('Progress',msg=>{if(paused){paused=false;updateBtns()}running=true;parseProgress(msg)});
hub.on('Completed',data=>{
    activeUrl=null;activeDlInfo=null;document.title='VIMM // DL';
    loadData();
});
hub.on('ConvertStatus',data=>{
    convStatuses[data.zipName]=data;
    renderActive();renderHistory();
    if(data.phase==='done'||data.phase==='error')loadData();
});
hub.on('Error',msg=>showError(msg));
hub.on('Done',()=>{running=false;paused=false;activeUrl=null;activeDlInfo=null;updateBtns();renderActive();document.title='VIMM // DL'});

hub.onreconnecting(()=>{$('conn-dot').className='dot warn'});
hub.onreconnected(()=>{$('conn-dot').className='dot on';loadConfig(true);restoreStatus();loadData()});
hub.onclose(()=>{$('conn-dot').className='dot off'});
hub.start().then(()=>{$('conn-dot').className='dot on';loadConfig();loadData();restoreStatus();checkForUpdate()});

function renderDiskCard(d,accent){
    if(!d)return'';
    const usedPct=d.totalSpace>0?((d.totalSpace-d.freeSpace)/d.totalSpace*100):0;
    const fillColor=usedPct>90?'var(--red)':usedPct>75?'var(--amber)':accent;
    return `<div class="sync-disk">
        <div class="sync-disk-label"><span class="drive">${esc(d.label)}</span></div>
        <div class="sync-disk-row"><span class="sync-disk-key">ISOs</span><span class="sync-disk-val">${d.isoCount} &middot; ${fmtBytes(d.isoTotalSize)}</span></div>
        <div class="sync-disk-row"><span class="sync-disk-key">Free</span><span class="sync-disk-val">${fmtBytes(d.freeSpace)}</span></div>
        <div class="sync-disk-row"><span class="sync-disk-key">Total</span><span class="sync-disk-val">${fmtBytes(d.totalSpace)}</span></div>
        <div class="sync-disk-bar"><div class="sync-disk-fill" style="width:${usedPct.toFixed(1)}%;background:${fillColor}"></div></div>
    </div>`;
}

function renderSync(){
    const el=$('sync-list');
    const stats=$('sync-stats');
    const disks=$('sync-disks');
    if(!syncData||!syncData.pathExists){
        const msg=syncData?.error||(!syncData?'Set target path and click Compare':'Target path does not exist or drive is disconnected');
        el.innerHTML=`<div class="empty" style="${syncData?.error?'color:var(--red)':''}">${esc(msg)}</div>`;
        stats.style.display='none';disks.style.display='none';$('sync-count').textContent='0';$('btn-sync-all').disabled=true;return;
    }
    if(syncData.error){
        el.innerHTML=`<div class="empty" style="color:var(--amber)">${esc(syncData.error)}</div>`;
        stats.style.display='none';disks.style.display='none';$('sync-count').textContent='0';$('btn-sync-all').disabled=true;return;
    }
    const newF=syncData.new||[],synced=syncData.synced||[],tOnly=syncData.targetOnly||[];
    $('sync-count').textContent=newF.length;
    $('btn-sync-all').disabled=newF.length===0;

    // Disk info cards
    if(syncData.source||syncData.target){
        disks.style.display='flex';
        disks.innerHTML=(syncData.source?renderDiskCard(syncData.source,'var(--accent2)'):'')
            +(syncData.target?renderDiskCard(syncData.target,'var(--blue)'):'');
    } else disks.style.display='none';

    stats.style.display='flex';
    const newSize=newF.reduce((a,f)=>a+f.size,0);
    stats.innerHTML=`<span class="sync-stat"><span class="dot-sm" style="background:var(--green)"></span> ${newF.length} new${newF.length?' &middot; '+fmtBytes(newSize):''}</span>`
        +`<span class="sync-stat"><span class="dot-sm" style="background:var(--accent2)"></span> ${synced.length} synced</span>`
        +`<span class="sync-stat"><span class="dot-sm" style="background:var(--text4)"></span> ${tOnly.length} target only</span>`;

    if(!newF.length&&!synced.length&&!tOnly.length){el.innerHTML='<div class="empty">No ISO files found</div>';return}

    let html='';
    newF.forEach(f=>{
        const cp=syncCopying[f.name];
        const prog=cp?`<div class="sync-copy-prog"><div class="sync-copy-fill" style="width:${cp.percent.toFixed(1)}%"></div></div>`:'';
        const statusText=cp?`${cp.percent.toFixed(1)}%`:'NEW';
        const statusColor=cp?'var(--amber)':'var(--green)';
        const fnAttr=`data-fn="${esc(f.name)}"`;
        const btn=cp?'':`<button class="ibtn ibtn-sm ibtn-play" ${fnAttr} onclick="syncCopySingle(this.dataset.fn)" title="Copy" style="width:22px;height:22px;font-size:10px">&#9654;</button>`;
        html+=`<div class="sync-file"><span class="sync-file-status" style="color:${statusColor}">${statusText}</span><span class="sync-file-name">${esc(f.name)}</span><span class="sync-file-size">${fmtBytes(f.size)}</span>${btn}</div>${prog?'<div style="padding:0 10px 2px">'+prog+'</div>':''}`;
    });
    synced.forEach(f=>{
        html+=`<div class="sync-file"><span class="sync-file-status" style="color:var(--accent2)">SYNCED</span><span class="sync-file-name">${esc(f.name)}</span><span class="sync-file-size">${fmtBytes(f.size)}</span></div>`;
    });
    tOnly.forEach(f=>{
        html+=`<div class="sync-file"><span class="sync-file-status" style="color:var(--text4)">TARGET</span><span class="sync-file-name" style="color:var(--text4)">${esc(f.name)}</span><span class="sync-file-size">${fmtBytes(f.size)}</span></div>`;
    });
    el.innerHTML=html;
}

hub.on('SyncProgress',data=>{
    syncCopying[data.filename]={percent:data.percent,copied:data.copied,total:data.total};
    renderSync();
});
hub.on('SyncCompleted',data=>{
    delete syncCopying[data.filename];
    if(data.success&&syncData){
        // Move from new to synced
        const idx=(syncData.new||[]).findIndex(f=>f.name===data.filename);
        if(idx>=0){const f=syncData.new.splice(idx,1)[0];syncData.synced.push(f)}
    } else if(!data.success&&data.error) showError('Sync copy failed: '+data.filename+' \u2014 '+data.error);
    renderSync();
    // Re-enable copy all button if nothing left copying
    if(Object.keys(syncCopying).length===0){$('btn-sync-all').disabled=(syncData?.new||[]).length===0;$('btn-sync-all').textContent='Copy All New'}
});

async function checkForUpdate(){
    try{
        const v=await(await fetch('/api/version')).json();
        if(v.hasUpdate){
            const el=$('update-bar');
            el.classList.add('show');
            el.innerHTML=`New version <strong>${esc(v.latest)}</strong> available &mdash; <a href="${esc(v.url)}" target="_blank">changelog</a><button class="dismiss" onclick="this.parentElement.classList.remove('show')">&times;</button>`;
        }
    }catch{}
}
</script>
</body>
</html>
