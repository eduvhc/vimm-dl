<!DOCTYPE html>
<html>
<head>
    <title>VIMM // DL</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#1a1d27;--surface:#222637;--surface2:#2a2f42;--surface3:#323750;
            --card:#262b3e;--card-hover:#2e3348;--card-active:#1e2a1e;
            --border:#353b52;--border-light:#424966;
            --accent:#5eead4;--accent2:#2dd4bf;
            --green:#4ade80;--green-bg:rgba(74,222,128,0.08);--green-border:rgba(74,222,128,0.2);
            --amber:#fbbf24;--amber-bg:rgba(251,191,36,0.08);
            --red:#fb7185;--red-bg:rgba(251,113,133,0.06);
            --text:#f1f5f9;--text2:#cbd5e1;--text3:#8b95ad;--text4:#5c6480;
            --sans:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
            --r:10px;--rs:6px;
        }
        body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;display:flex;flex-direction:column;height:100vh;-webkit-font-smoothing:antialiased}

        /* Header */
        .hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
        .logo{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--accent)}
        .logo span{color:var(--text4);font-weight:400}
        .dot{width:8px;height:8px;border-radius:50%}
        .dot.on{background:var(--green);box-shadow:0 0 8px rgba(74,222,128,0.4)}
        .dot.off{background:var(--red)}.dot.warn{background:var(--amber)}


        /* Add bar */
        .add-bar{display:flex;gap:6px;padding:6px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
        .ta{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text2);font-family:var(--mono);font-size:11px;padding:6px 8px;resize:none;height:30px;outline:none;transition:all 0.2s}
        .ta:focus{border-color:var(--accent2);color:var(--text);height:60px}
        .ta::placeholder{color:var(--text4)}
        .btn-add{background:var(--accent2);color:#0f172a;border:none;font-weight:700;padding:6px 16px;border-radius:var(--rs);cursor:pointer;font-size:11px;font-family:var(--sans)}
        .btn-add:hover{background:var(--accent)}

        /* Controls */
        .ctrls{display:flex;gap:4px;padding:6px 20px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
        .cb{font-family:var(--sans);font-size:11px;font-weight:600;border-radius:var(--rs);padding:6px 16px;cursor:pointer;border:1px solid;background:transparent;transition:all 0.15s}
        .cb:disabled{opacity:0.2;cursor:not-allowed}
        .cb-go{color:var(--green);border-color:var(--green-border);flex:1}
        .cb-go:hover:not(:disabled){background:var(--green-bg)}
        .cb-pause{color:var(--amber);border-color:rgba(251,191,36,0.25)}
        .cb-pause:hover:not(:disabled){background:var(--amber-bg)}
        .cb-stop{color:var(--red);border-color:rgba(251,113,133,0.25)}
        .cb-stop:hover:not(:disabled){background:var(--red-bg)}
        .cb-clr{color:var(--text4);border-color:var(--border)}
        .cb-clr:hover{color:var(--text3);background:var(--surface)}

        /* Errors */
        .errs{display:none;padding:6px 20px;background:rgba(248,113,113,0.05);border-bottom:1px solid rgba(248,113,113,0.15);font-size:11px;color:var(--red);font-family:var(--mono);max-height:50px;overflow-y:auto;flex-shrink:0}
        .errs.show{display:block}
        .update-bar{display:none;padding:8px 20px;background:rgba(94,234,212,0.06);border-bottom:1px solid rgba(94,234,212,0.15);font-size:12px;color:var(--accent);flex-shrink:0;align-items:center;gap:10px}
        .update-bar.show{display:flex}
        .update-bar a{color:var(--accent);font-weight:600;text-decoration:underline}
        .update-bar .dismiss{background:none;border:none;color:var(--text4);cursor:pointer;font-size:14px;margin-left:auto;font-family:var(--sans)}

        /* Section headers */
        .sec{display:flex;align-items:center;justify-content:space-between;padding:6px 20px;flex-shrink:0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text4)}
        .sec .cnt{font-family:var(--mono);font-size:11px;color:var(--text3);background:var(--surface2);padding:1px 8px;border-radius:12px}

        /* Queue — uTorrent style */
        .queue{flex:1;overflow-y:auto;padding:0 12px 8px;min-height:0}
        .qi{display:flex;align-items:stretch;gap:12px;padding:10px 14px;margin-bottom:3px;background:var(--card);border-radius:var(--r);border:1px solid transparent;transition:all 0.15s;position:relative;overflow:hidden}
        .qi:hover{background:var(--card-hover);border-color:var(--border)}
        /* Active item highlight */
        .qi.active{border-color:var(--green-border);background:linear-gradient(135deg,rgba(74,222,128,0.04),rgba(74,222,128,0.01))}
        .qi.paused{border-color:rgba(251,191,36,0.2);background:linear-gradient(135deg,rgba(251,191,36,0.04),rgba(251,191,36,0.01))}
        .qi-body{flex:1;min-width:0}
        .qi-r1{display:flex;align-items:center;gap:8px;margin-bottom:2px}
        .qi-title{font-weight:600;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
        .qi-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:12px;text-transform:uppercase;letter-spacing:0.3px;flex-shrink:0}
        .qi-badge.dl{background:var(--green-bg);color:var(--green)}
        .qi-badge.paused{background:var(--amber-bg);color:var(--amber)}
        .qi-badge.resuming{background:var(--amber-bg);color:var(--amber)}
        .qi-pct{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green);flex-shrink:0}
        .qi-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:2px}
        .qi-plat{display:inline-flex;align-items:center;gap:6px;color:var(--text2);font-weight:500}
        .qi-icon{width:28px;height:28px;display:inline-block;flex-shrink:0;-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center}
        .qi-icon.ic-ps{background:#3b82f6}
        .qi-icon.ic-nintendo{background:#ef4444}
        .qi-icon.ic-sega{background:#3b82f6}
        .qi-icon.ic-xbox{background:#22c55e}
        .qi-icon.ic-default{background:var(--text3)}
        .qi-size{color:var(--accent2);font-family:var(--mono);font-weight:600;font-size:11px}
        /* Inline progress */
        .qi-prog{margin-top:6px}
        .qi-prog-info{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px}
        .qi-prog-size{color:var(--text3);font-family:var(--mono)}
        .qi-prog-track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
        .qi-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--green));border-radius:2px;transition:width 0.4s ease}
        .qi-prog-fill.paused{background:linear-gradient(90deg,#d97706,var(--amber))}
        /* Partial (not active) */
        .qi-partial{margin-top:4px}
        .qi-partial-txt{font-size:10px;color:var(--amber);font-family:var(--mono);font-weight:500}
        .qi-partial-track{height:3px;background:var(--surface2);border-radius:2px;margin-top:2px;overflow:hidden}
        .qi-partial-fill{height:100%;background:var(--amber);border-radius:2px}
        .qi-acts{display:flex;flex-direction:column;gap:3px;flex-shrink:0;align-items:center}
        .qi-b{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;transition:all 0.15s;border:none}
        .qi-play{background:var(--green-bg);color:var(--green);font-size:13px}
        .qi-play:hover{background:rgba(74,222,128,0.2);transform:scale(1.1)}
        .qi-pause-btn{background:var(--amber-bg);color:var(--amber);font-size:13px;position:relative;width:30px;height:30px}
        .qi-pause-btn::before,.qi-pause-btn::after{content:'';position:absolute;top:9px;width:3px;height:12px;background:var(--amber);border-radius:1px}
        .qi-pause-btn::before{left:10px}
        .qi-pause-btn::after{right:10px}
        .qi-pause-btn:hover{background:rgba(251,191,36,0.2);transform:scale(1.1)}
        .qi-resume-btn{background:var(--green-bg);color:var(--green);font-size:13px;box-shadow:0 0 12px rgba(74,222,128,0.2)}
        .qi-resume-btn:hover{background:rgba(74,222,128,0.25);transform:scale(1.1)}
        .qi-x{background:transparent;color:var(--text4);font-size:11px}
        .qi-x:hover{background:var(--red-bg);color:var(--red);transform:scale(1.1)}
        .qi-mv{background:transparent;color:var(--text4);font-size:10px;width:22px;height:22px}
        .qi-mv:hover{background:var(--surface3);color:var(--text2);transform:scale(1.1)}
        .qi-mv:disabled{opacity:0.15;cursor:not-allowed;transform:none}
        .q-empty{color:var(--text4);padding:40px;text-align:center;font-size:13px}

        /* Completed */
        .done{overflow-y:auto;padding:0 12px 8px;max-height:22vh;flex-shrink:0}
        .di{display:flex;align-items:center;gap:10px;padding:8px 14px;margin-bottom:2px;border-radius:var(--rs);font-size:12px}
        .di:hover{background:var(--surface)}
        .di-num{font-family:var(--mono);font-size:10px;color:var(--green);min-width:20px;font-weight:600}
        .di-info{flex:1;min-width:0}
        .di-name{color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .di-path{font-size:10px;color:var(--text4);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
        .di-path.exists{color:var(--accent2);cursor:pointer}
        .di-path.exists:hover{text-decoration:underline}
        .di-path.missing{color:var(--red);font-style:italic}
        .di-time{color:var(--text4);font-family:var(--mono);font-size:10px;flex-shrink:0}
        .done-empty{color:var(--text4);padding:16px;text-align:center;font-size:12px}

        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    </style>
</head>
<body>

<div class="hdr">
    <div class="logo">VIMM<span>//</span>DL</div>
    <div class="dot on" id="conn-dot"></div>
</div>


<div class="add-bar">
    <textarea class="ta" id="urls" placeholder="Paste vault URLs, one per line..." spellcheck="false"></textarea>
    <button class="btn-add" id="btn-add">Add</button>
</div>

<div class="ctrls">
    <button class="cb cb-go" id="btn-start" disabled>Start</button>
    <button class="cb cb-pause" id="btn-pause" disabled>Pause</button>
    <button class="cb cb-stop" id="btn-stop" disabled>Stop</button>
    <button class="cb cb-clr" id="btn-clear">Clear</button>
</div>

<div class="update-bar" id="update-bar"></div>
<div class="errs" id="err-box"></div>

<div class="sec">Queue <span class="cnt" id="queue-count">0</span></div>
<div class="queue" id="queue-list"><div class="q-empty">No items in queue</div></div>

<div class="sec">Completed <span class="cnt" id="completed-count">0</span></div>
<div class="done" id="completed-log"><div class="done-empty">No downloads yet</div></div>

<script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.0/dist/browser/signalr.min.js"></script>
<script>
const $=id=>document.getElementById(id);
const hub=new signalR.HubConnectionBuilder().withUrl('/hub').withAutomaticReconnect().build();
let running=false,paused=false,activePath='';
let partialsCache={},activeUrl=null,activeDlInfo=null;
const metaCache={};

const platformIcons={
    'playstation 3':'playstation3.svg','playstation 2':'playstation2.svg','playstation':'playstation.svg',
    'ps3':'playstation3.svg','ps2':'playstation2.svg','ps1':'playstation.svg','psp':'psp.svg','ps vita':'psvita.svg',
    'nintendo 64':'n64.svg','gamecube':'gamecube.svg','wii':'wii.svg','wii u':'wiiu.svg','switch':'switch.svg',
    'game boy':'gameboy.svg','game boy color':'gameboycolor.svg','game boy advance':'gba.svg',
    'nintendo ds':'nds.svg','nintendo 3ds':'3ds.svg','nes':'nes.svg',
    'super nintendo':'snes.svg','snes':'snes.svg','sega genesis':'genesis.svg','genesis':'genesis.svg',
    'sega saturn':'saturn.svg','dreamcast':'dreamcast.svg','xbox':'xbox.svg','xbox 360':'xbox360.svg',
};
function iconFor(p){
    if(!p)return'';
    const f=platformIcons[p.toLowerCase()];if(!f)return'';
    const k=p.toLowerCase();
    const cls=k.includes('playstation')||k.includes('ps')||k==='psp'?'ic-ps'
        :k.includes('nintendo')||k.includes('game boy')||k==='nes'||k.includes('snes')||k==='super nintendo'||k.includes('wii')||k==='gamecube'||k==='switch'||k.includes('ds')?'ic-nintendo'
        :k.includes('sega')||k==='genesis'||k==='dreamcast'||k==='saturn'?'ic-sega'
        :k.includes('xbox')?'ic-xbox':'ic-default';
    return `<span class="qi-icon ${cls}" style="-webkit-mask-image:url(/icons/${f});mask-image:url(/icons/${f})"></span>`;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function showError(msg){const el=$('err-box');el.classList.add('show');el.innerHTML+=`<div>${new Date().toLocaleTimeString('en-US',{hour12:false})} ${esc(msg)}</div>`;el.scrollTop=el.scrollHeight}

function setRunning(v){running=v;updateBtns();renderQueue()}
function setPaused(v){paused=v;updateBtns();renderQueue()}
function updateBtns(){
    const has=$('queue-count').textContent!=='0';
    $('btn-start').disabled=running&&!paused;$('btn-start').textContent=paused?'Resume':'Start';
    if(!has&&!paused)$('btn-start').disabled=true;
    $('btn-pause').disabled=!running;$('btn-stop').disabled=!running&&!paused;
}

async function fetchMeta(url){if(metaCache[url])return metaCache[url];try{const r=await fetch('/api/meta?url='+encodeURIComponent(url));if(r.ok){const m=await r.json();metaCache[url]=m;return m}}catch{}return null}

async function loadConfig(silent){
    const c=await(await fetch('/api/config')).json();
    activePath=c.activePath;
    if(c.isRunning)setRunning(true);
}
async function restoreStatus(){
    const s=await(await fetch('/api/status')).json();
    if(s.currentUrl) activeUrl=s.currentUrl;
    if(s.isRunning){running=true;if(s.progress)parseProgress(s.progress);updateBtns();renderQueue()}
    if(s.isPaused){paused=true;updateBtns();renderQueue()}
    if(s.recentLogs?.length)s.recentLogs.forEach(l=>{if(l.type==='Error')showError(l.message)});
}


let queuedItems=[],metaFetching=new Set();
async function loadData(){
    const d=await(await fetch('/api/data')).json();
    try{const p=await(await fetch('/api/partials')).json();partialsCache={};(p.files||[]).forEach(f=>{partialsCache[f.name]=f})}catch{}
    queuedItems=d.queued;renderQueue();renderCompleted(d.completed);
    const miss=d.queued.filter(it=>!it.title&&!metaFetching.has(it.url));
    for(const it of miss){metaFetching.add(it.url);fetchMeta(it.url).then(m=>{metaFetching.delete(it.url);if(m){const qi=queuedItems.find(q=>q.url===it.url);if(qi){qi.title=m.title;qi.platform=m.platform;qi.size=m.size}renderQueue()}})}
}

function renderQueue(){
    const items=queuedItems,el=$('queue-list');$('queue-count').textContent=items.length;
    if(!items.length){el.innerHTML='<div class="q-empty">No items in queue</div>';updateBtns();return}
    el.innerHTML=items.map((it,i)=>{
        const has=!!it.title;
        const isActive=activeUrl&&it.url===activeUrl&&running&&!paused;
        const isPaused=activeUrl&&it.url===activeUrl&&paused;
        const title=has?esc(it.title):esc(it.url.split('/').pop());
        const icon=has?iconFor(it.platform):'';
        const plat=has&&it.platform?`<span class="qi-plat">${icon}${esc(it.platform)}</span>`:'';
        const size=has&&it.size?`<span class="qi-size">${esc(it.size)}</span>`:'';
        const meta=(plat||size)?`<div class="qi-meta">${plat}${size}</div>`:(has?'':`<div class="qi-meta" style="color:var(--text4)">${esc(it.url)}</div>`);

        let badge='',pctText='',progHtml='';
        if(isActive&&activeDlInfo){
            badge='<span class="qi-badge dl">Downloading</span>';
            pctText=`<span class="qi-pct">${activeDlInfo.pct}</span>`;
            progHtml=`<div class="qi-prog"><div class="qi-prog-info"><span class="qi-prog-size">${activeDlInfo.size}</span></div><div class="qi-prog-track"><div class="qi-prog-fill" style="width:${activeDlInfo.width}"></div></div></div>`;
        } else if(isPaused&&activeDlInfo){
            badge='<span class="qi-badge paused">Paused</span>';
            pctText=`<span class="qi-pct" style="color:var(--amber)">${activeDlInfo.pct}</span>`;
            progHtml=`<div class="qi-prog"><div class="qi-prog-info"><span class="qi-prog-size">${activeDlInfo.size}</span></div><div class="qi-prog-track"><div class="qi-prog-fill paused" style="width:${activeDlInfo.width}"></div></div></div>`;
        } else if(isActive||isPaused){
            badge=isActive?'<span class="qi-badge resuming">Starting</span>':'<span class="qi-badge paused">Paused</span>';
        } else if(has&&it.size){
            // Check for partial file
            const sz=it.size.match(/([\d.]+)\s*(GB|MB)/i);
            if(sz){const totalMB=sz[2].toUpperCase()==='GB'?parseFloat(sz[1])*1024:parseFloat(sz[1]);const hit=Object.keys(partialsCache).find(n=>n.toLowerCase().includes(it.title.substring(0,Math.min(15,it.title.length)).toLowerCase()));if(hit){const pf=partialsCache[hit],pct=totalMB>0?(pf.mb/totalMB*100):0;if(pct>0.1&&pct<100)progHtml=`<div class="qi-partial"><span class="qi-partial-txt">${pf.mb.toFixed(2)} / ${totalMB.toFixed(2)} MB \u00b7 ${pct.toFixed(2)}%</span><div class="qi-partial-track"><div class="qi-partial-fill" style="width:${Math.min(pct,100).toFixed(2)}%"></div></div></div>`}}
        }

        const cls=isActive?'qi active':isPaused?'qi paused':'qi';
        let actionBtn;
        if(isActive) actionBtn=`<button class="qi-b qi-pause-btn" onclick="pauseItem()" title="Pause"></button>`;
        else if(isPaused) actionBtn=`<button class="qi-b qi-resume-btn" onclick="resumeItem()" title="Resume">&#9654;</button>`;
        else actionBtn=`<button class="qi-b qi-play" onclick="playItem(${it.id})" title="Download this">&#9654;</button>`;

        const isFirst=i===0, isLast=i===items.length-1;
        return `<div class="${cls}">
            <div class="qi-acts">
                <button class="qi-b qi-mv" onclick="moveItem(${it.id},'up')" title="Move up" ${isFirst?'disabled':''}>&#9650;</button>
                <button class="qi-b qi-mv" onclick="moveItem(${it.id},'down')" title="Move down" ${isLast?'disabled':''}>&#9660;</button>
            </div>
            <div class="qi-body">
                <div class="qi-r1">${pctText}<span class="qi-title">${title}</span>${badge}</div>
                ${meta}${progHtml}
            </div>
            <div class="qi-acts">
                ${actionBtn}
                <button class="qi-b qi-x" onclick="rmItem(${it.id})" title="Remove">&#10005;</button>
            </div>
        </div>`;
    }).join('');
}

function renderCompleted(items){
    const el=$('completed-log');$('completed-count').textContent=items.length;
    if(!items.length){el.innerHTML='<div class="done-empty">No downloads yet</div>';return}
    el.innerHTML=items.map((it,i)=>{
        const path=it.filepath||'';
        return `<div class="di">
            <span class="di-num">${String(i+1).padStart(2,'0')}</span>
            <div class="di-info">
                <div class="di-name">${esc(it.filename)}</div>
                ${path?`<div class="di-path" id="dp-${it.id}" data-path="${esc(path)}">${esc(path)}</div>`:''}
            </div>
        </div>`;
    }).join('');
    // Check which files still exist
    items.forEach(it=>{
        if(!it.filepath)return;
        const el=document.getElementById('dp-'+it.id);
        if(!el)return;
        fetch('/api/check-exists?filename='+encodeURIComponent(it.filename)).then(r=>r.json()).then(d=>{
            if(d.exists){el.classList.add('exists');el.title='File exists: '+d.path}
            else{el.classList.add('missing');el.textContent='File removed';el.title=it.filepath}
        }).catch(()=>{});
    });
    el.scrollTop=el.scrollHeight;
}

$('btn-add').onclick=async()=>{const t=$('urls').value.trim();if(!t)return;
// Parse URLs: split by newlines, spaces, or extract all https:// URLs from pasted text
// Split on http/https boundaries then extract URLs
const urls=[...new Set((t.replace(/(https?:\/\/)/gi,'\n$1').match(/https?:\/\/[^\s,;|"'<>]+/gi))||[])].filter(u=>u);
if(!urls.length)return;await fetch('/api/queue',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({urls})});$('urls').value='';$('urls').style.height='';loadData();
// Auto-start if not already running
if(!running){hub.invoke('StartDownload',activePath);paused=false;running=true;updateBtns()}};
$('btn-start').onclick=()=>{hub.invoke('StartDownload',activePath);paused=false;running=true;updateBtns();renderQueue()};
$('btn-pause').onclick=()=>{hub.invoke('PauseDownload');paused=true;running=false;updateBtns();renderQueue()};
$('btn-stop').onclick=()=>{hub.invoke('StopDownload');paused=false;running=false;activeUrl=null;activeDlInfo=null;updateBtns();renderQueue();document.title='VIMM // DL'};
$('btn-clear').onclick=async()=>{await fetch('/api/queue',{method:'DELETE'});loadData()};
window.rmItem=async id=>{await fetch(`/api/queue/${id}`,{method:'DELETE'});loadData()};
window.playItem=async id=>{hub.invoke('StartSpecific',activePath,id);paused=false;running=true;updateBtns();
    // Refresh partials so the previously downloading item shows its progress bar
    await refreshPartials();renderQueue()};
window.pauseItem=async()=>{hub.invoke('PauseDownload');paused=true;running=false;updateBtns();
    // Small delay for file to flush, then refresh partials
    setTimeout(async()=>{await refreshPartials();renderQueue()},1000)};
window.resumeItem=()=>{hub.invoke('StartDownload',activePath);paused=false;running=true;updateBtns();renderQueue()};

async function refreshPartials(){
    try{const p=await(await fetch('/api/partials')).json();partialsCache={};(p.files||[]).forEach(f=>{partialsCache[f.name]=f})}catch{}
}
window.moveItem=async(id,dir)=>{await fetch('/api/queue/move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,direction:dir})});loadData()};
$('urls').addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='Enter')$('btn-add').click()});

function parseProgress(msg){
    const m=msg.match(/^(.+?):\s*([\d.]+)\s*\/\s*([\d.]+)\s*MB\s*\(([\d.]+)%\)/);
    if(m){
        const[,file,dl,total,pct]=m;
        activeDlInfo={pct:parseFloat(pct).toFixed(2)+'%',size:`${dl} / ${total} MB`,width:pct+'%'};
        document.title=`${parseFloat(pct).toFixed(2)}% \u2014 ${file}`;
        renderQueue();
        return;
    }
    const m2=msg.match(/^(.+?):\s*([\d.]+)\s*MB/);
    if(m2){activeDlInfo={pct:'--',size:m2[2]+' MB',width:'0%'};renderQueue()}
}

hub.on('Status',msg=>{
    if(msg.startsWith('Processing:'))activeUrl=msg.replace('Processing: ','').trim();
    renderQueue();
});
hub.on('Progress',msg=>{if(paused){paused=false;updateBtns()}running=true;parseProgress(msg)});
hub.on('Completed',data=>{
    activeUrl=null;activeDlInfo=null;document.title='VIMM // DL';
    const el=$('completed-log'),c=parseInt($('completed-count').textContent||'0')+1;
    $('completed-count').textContent=c;
    const ts=new Date().toLocaleTimeString('en-US',{hour12:false});
    const fp=data.filepath?`<div class="di-path exists" title="${esc(data.filepath)}">${esc(data.filepath)}</div>`:'';
    el.innerHTML+=`<div class="di"><span class="di-num">${String(c).padStart(2,'0')}</span><div class="di-info"><div class="di-name">${esc(data.filename)}</div>${fp}</div><span class="di-time">${ts}</span></div>`;
    el.scrollTop=el.scrollHeight;loadData();
});
hub.on('Error',msg=>showError(msg));
hub.on('Done',()=>{running=false;paused=false;activeUrl=null;activeDlInfo=null;updateBtns();renderQueue();document.title='VIMM // DL'});

hub.onreconnecting(()=>{$('conn-dot').className='dot warn'});
hub.onreconnected(()=>{$('conn-dot').className='dot on';loadConfig(true);restoreStatus();loadData()});
hub.onclose(()=>{$('conn-dot').className='dot off'});
hub.start().then(()=>{$('conn-dot').className='dot on';loadConfig();loadData();restoreStatus();checkForUpdate()});

async function checkForUpdate(){
    try{
        const v=await(await fetch('/api/version')).json();
        if(v.hasUpdate){
            const el=$('update-bar');
            el.classList.add('show');
            el.innerHTML=`New version <strong>${esc(v.latest)}</strong> available &mdash; <a href="${esc(v.url)}" target="_blank">changelog</a><button class="dismiss" onclick="this.parentElement.classList.remove('show')">&times;</button>`;
        }
    }catch{}
}
</script>
</body>
</html>
